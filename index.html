<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skor Ağı - Sosyal Medya Şablonları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-canvas">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        
        <div class="glass-module match-result-card">
            <div class="league-badge">UEFA Avrupa Ligi</div>
            <div class="teams-container">
                <div class="team">
                    <div class="team-logo" style="background: #003090;">FB</div> <h3>Fenerbahçe</h3>
                </div>
                <div class="score-board">
                    <span class="status">MAÇ SONUCU</span>
                    <div class="score">3 - 1</div>
                    <span class="half-time">İY: 1-0</span>
                </div>
                <div class="team">
                    <div class="team-logo" style="background: #e2001a;">SLA</div> <h3>Slavia Prag</h3>
                </div>
            </div>
            <div class="goal-scorers">
                <p><span class="orange-text">⚽</span> 24' Dzeko, 67' Tadić, 82' Szymanski</p>
            </div>
            <div class="brand-footer">SKOR AĞI</div>
        </div>

        <div class="glass-module standings-card">
            <h3 class="module-title">Puan Durumu <span class="orange-text">• A Grubu</span></h3>
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>Sıra</th>
                        <th>Takım</th>
                        <th>O</th>
                        <th>P</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="highlight-row">
                        <td>1</td>
                        <td><strong>Fenerbahçe</strong></td>
                        <td>4</td>
                        <td class="points">10</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Ajax</td>
                        <td>4</td>
                        <td class="points">7</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Slavia Prag</td>
                        <td>4</td>
                        <td class="points">4</td>
                    </tr>
                    <tr>
                        <td>4</td>
                        <td>Lille</td>
                        <td>4</td>
                        <td class="points">1</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="glass-module mvp-card">
            <div class="mvp-header">GÜNÜN YILDIZI</div>
            <div class="mvp-content">
                <div class="player-placeholder"></div> <div class="player-stats">
                    <h2>D. Tadić</h2>
                    <div class="stat-row">
                        <span>Gol:</span> <span class="orange-text">1</span>
                    </div>
                    <div class="stat-row">
                        <span>Asist:</span> <span class="orange-text">2</span>
                    </div>
                    <div class="stat-row">
                        <span>Pas İsabeti:</span> <span class="orange-text">%89</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
